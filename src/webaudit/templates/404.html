<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — AgentLighthouse</title>
    <meta name="robots" content="noindex, nofollow">
    {% if site_url %}<link rel="canonical" href="{{ site_url }}/">{% endif %}
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0b; color: #e0e0e4; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        main { text-align: center; padding: 2rem; }
        h1 { font-size: 6rem; font-weight: 700; color: #ff6b2b; font-family: 'JetBrains Mono', monospace; line-height: 1; }
        p { color: #9a9aa2; font-size: 1.1rem; margin: 1rem 0 2rem; }
        a { color: #ff6b2b; text-decoration: none; font-weight: 600; border: 1px solid #ff6b2b; padding: 0.6rem 1.5rem; border-radius: 6px; transition: background 0.2s; }
        a:hover { background: #ff6b2b; color: #0a0a0b; }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>404</h1>
            <p>Page not found. This lighthouse beam didn't find anything here.</p>
            <a href="/">Back to AgentLighthouse</a>
        </section>
    </main>
</body>
</html>
