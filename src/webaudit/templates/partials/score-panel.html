<!-- Score Card -->
<div class="score-card">
    <div class="scanned-url" id="scannedUrl"></div>
    <div class="score-ring">
        <svg viewBox="0 0 120 120">
            <circle class="bg" cx="60" cy="60" r="55"/>
            <circle class="progress" id="scoreProgress" cx="60" cy="60" r="55"/>
        </svg>
        <div class="score-number" id="scoreNumber">0</div>
        <div class="score-sub">/100</div>
    </div>
    <div class="score-label" id="scoreLabel">—</div>
    <div class="summary-stats">
        <div class="stat pass">
            <div class="num" id="passCount">0</div>
            <div class="lbl">Passed</div>
        </div>
        <div class="stat warn">
            <div class="num" id="warnCount">0</div>
            <div class="lbl">Warnings</div>
        </div>
        <div class="stat fail">
            <div class="num" id="failCount">0</div>
            <div class="lbl">Failed</div>
        </div>
    </div>
    <div class="score-extras" id="scoreExtras"></div>
    <div class="report-buttons" id="reportButtons" style="display:none">
        <button class="btn-report btn-report-json" id="exportJsonBtn" title="Download audit data as JSON">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0L5 7m3 3l3-3M3 12v1.5h10V12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Basic Report
        </button>
        <div class="btn-report-wrap">
            <span class="badge-coming-soon">COMING SOON</span>
            <button class="btn-report btn-report-adv disabled" disabled title="Advanced PDF report with remediation">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 2h5l4 4v7a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.3"/><path d="M9 2v4h4M6 9h4M6 11.5h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                Advanced Report
            </button>
        </div>
    </div>
</div>
